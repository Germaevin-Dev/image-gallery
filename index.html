<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Interactive Image Gallery</h1>

    <!-- Filter Buttons -->
    <div class="filter-buttons">
        <button data-filter="all" class="active">All</button>
        <button data-filter="nature">Nature</button>
        <button data-filter="technology">Technology</button>
        <button data-filter="people">People</button>
    </div>

    <!-- Gallery Grid -->
    <div class="gallery">

        <div class="gallery-item nature">
            <img src="beautiful-colorful-autumn-leaves.jpg" alt="">
            <div class="overlay">
                <h3>Beautiful Forest</h3>
            </div>
        </div>

        <div class="gallery-item technology">
            <img src="peaceful-businessman-vr-headset-enjoying-virtual-video.jpg" alt="">
            <div class="overlay">
                <h3>Modern Tech</h3>
            </div>
        </div>

        <div class="gallery-item people">
            <img src="smiley face.jpg" alt="">
            <div class="overlay">
                <h3>Smiling Person</h3>
            </div>
        </div>

        <div class="gallery-item nature">
            <img src="beautiful-mountains-landscape.jpg" alt="">
            <div class="overlay">
                <h3>Mountain View</h3>
            </div>
        </div>

        <div class="gallery-item technology">
            <img src="modern-stationary-collection-arrangement.jpg" alt="">
            <div class="overlay">
                <h3>Smart Devices</h3>
            </div>
        </div>

        <div class="gallery-item people">
            <img src="team-business-people-stacking-hands.jpg" alt="">
            <div class="overlay">
                <h3>Team Collaboration</h3>
            </div>
        </div>

    </div>

<script src="script.js"></script>


<footer>
  <p>&copy; 2026 Germaevin-Dev</p>
</footer>

</body>
</html>
